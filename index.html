    <!--
      MediaPipe MUST load via CDN script tags as globals (window.Hands, window.Camera).
      The npm package does not ship clean ES modules and fails silently under Vite.
      This is a hard architectural constraint — do not move to imports.
    -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
